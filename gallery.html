<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chain of War — Armory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #050510;
            color: #E0E0E0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding-top: 60px; /* Space for nav */
        }

        /* Floating particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(0, 229, 255, 0.1);
            border-radius: 50%;
            animation: float 8s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, rgba(5,5,16,0.95) 0%, rgba(26,26,46,0.95) 50%, rgba(5,5,16,0.95) 100%);
            backdrop-filter: blur(20px);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            position: relative;
            z-index: 1;
        }

        .header-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: url('assets/logo.png') center/contain no-repeat;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.3));
        }

        .header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            background: linear-gradient(45deg, #00E5FF, #ffffff, #00E5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
        }

        .header p {
            color: #888;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Controls */
        .controls {
            padding: 2rem;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
        }

        .control-section {
            margin-bottom: 2rem;
        }

        .control-section h3 {
            color: #00E5FF;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Filter buttons */
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            border: 1px solid #333;
            background: rgba(0, 0, 0, 0.3);
            color: #E0E0E0;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-btn:hover {
            border-color: #00E5FF;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        .filter-btn.active {
            background: linear-gradient(45deg, #00E5FF, #0099CC);
            border-color: #00E5FF;
            color: white;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        /* Faction specific colors */
        .filter-btn.faction-iron-covenant.active { background: linear-gradient(45deg, #8A8A8A, #B87333); }
        .filter-btn.faction-swarm-of-xeth.active { background: linear-gradient(45deg, #4A148C, #C6FF00); }
        .filter-btn.faction-void-pharaohs.active { background: linear-gradient(45deg, #1A1A2E, #FFB300); }
        .filter-btn.faction-emerald-tide.active { background: linear-gradient(45deg, #BF360C, #FFD600); }
        .filter-btn.faction-celestial-order.active { background: linear-gradient(45deg, #2A2A3A, #00BFA5); }
        .filter-btn.faction-warp-touched.active { background: linear-gradient(45deg, #B71C1C, #FF5252); }
        .filter-btn.faction-shadow-kin.active { background: linear-gradient(45deg, #1A237E, #C0C0C0); }
        .filter-btn.faction-steel-legion.active { background: linear-gradient(45deg, #556B2F, #FFA000); }
        .filter-btn.faction-bone-prophets.active { background: linear-gradient(45deg, #2A2020, #E91E63); }
        .filter-btn.faction-apex-hunters.active { background: linear-gradient(45deg, #00695C, #FF6D00); }

        /* Search */
        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: 25px;
            color: #E0E0E0;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: #00E5FF;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        .search-box::placeholder {
            color: #666;
        }

        /* Sort controls */
        .sort-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .sort-select {
            padding: 0.75rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: 25px;
            color: #E0E0E0;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            min-width: 150px;
        }

        .sort-select:focus {
            border-color: #00E5FF;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        /* Army Builder */
        .army-builder {
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid #00E5FF;
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 2rem;
            backdrop-filter: blur(10px);
        }

        .army-builder.active {
            background: rgba(0, 30, 45, 0.9);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        }

        .army-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1rem;
        }

        .toggle-builder-btn {
            padding: 1rem 2rem;
            background: linear-gradient(45deg, #00E5FF, #0099CC);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toggle-builder-btn:hover {
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
            transform: translateY(-2px);
        }

        .army-info {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .army-stat {
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 1px solid #333;
        }

        .army-stat strong {
            color: #00E5FF;
        }

        /* Gallery Grid */
        .gallery {
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .unit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Card styling */
        .unit-card {
            width: 180px;
            height: 290px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border-radius: 15px;
            border: 2px solid #333;
            position: relative;
            cursor: pointer;
            transition: all 0.4s ease;
            transform-style: preserve-3d;
            animation: cardEntrance 0.6s ease forwards;
            opacity: 0;
            transform: translateY(50px);
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .unit-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: #00E5FF;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 229, 255, 0.3);
        }

        .unit-card.in-army {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* Card header */
        .card-header {
            height: 60px;
            border-radius: 13px 13px 0 0;
            position: relative;
            overflow: hidden;
        }

        .card-header.iron-covenant { background: linear-gradient(45deg, #8A8A8A, #B87333); }
        .card-header.swarm-of-xeth { background: linear-gradient(45deg, #4A148C, #C6FF00); }
        .card-header.void-pharaohs { background: linear-gradient(45deg, #1A1A2E, #FFB300); }
        .card-header.emerald-tide { background: linear-gradient(45deg, #BF360C, #FFD600); }
        .card-header.celestial-order { background: linear-gradient(45deg, #2A2A3A, #00BFA5); }
        .card-header.warp-touched { background: linear-gradient(45deg, #B71C1C, #FF5252); }
        .card-header.shadow-kin { background: linear-gradient(45deg, #1A237E, #C0C0C0); }
        .card-header.steel-legion { background: linear-gradient(45deg, #556B2F, #FFA000); }
        .card-header.bone-prophets { background: linear-gradient(45deg, #2A2020, #E91E63); }
        .card-header.apex-hunters { background: linear-gradient(45deg, #00695C, #FF6D00); }

        .faction-emblem {
            position: absolute;
            top: 8px;
            left: 12px;
            width: 32px;
            height: 32px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .iron-covenant .faction-emblem { background-image: url('assets/emblem-iron-covenant.png'); }
        .swarm-of-xeth .faction-emblem { background-image: url('assets/emblem-swarm-of-xeth.png'); }
        .void-pharaohs .faction-emblem { background-image: url('assets/emblem-void-pharaohs.png'); }
        .emerald-tide .faction-emblem { background-image: url('assets/emblem-emerald-tide.png'); }
        .celestial-order .faction-emblem { background-image: url('assets/emblem-celestial-order.png'); }
        .warp-touched .faction-emblem { background-image: url('assets/emblem-warp-touched.png'); }
        .shadow-kin .faction-emblem { background-image: url('assets/emblem-shadow-kin.png'); }
        .steel-legion .faction-emblem { background-image: url('assets/emblem-steel-legion.png'); }
        .bone-prophets .faction-emblem { background-image: url('assets/emblem-bone-prophets.png'); }
        .apex-hunters .faction-emblem { background-image: url('assets/emblem-apex-hunters.png'); }

        /* Points badge */
        .points-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            color: #FFD700;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%);
            min-width: 40px;
            text-align: center;
        }

        /* Role badge */
        .role-badge {
            position: absolute;
            bottom: 8px;
            left: 12px;
            background: rgba(0, 229, 255, 0.2);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* Card content */
        .card-content {
            padding: 12px;
            height: 230px;
            display: flex;
            flex-direction: column;
        }

        .unit-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #E0E0E0;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        /* Stats */
        .stats {
            margin: 8px 0;
        }

        .stat-bar {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
            font-size: 0.7rem;
        }

        .stat-label {
            width: 25px;
            font-weight: 500;
            margin-right: 4px;
        }

        .stat-value {
            width: 15px;
            text-align: right;
            margin-right: 6px;
            font-weight: 600;
        }

        .stat-visual {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .stat-fill.war { background: #B87333; }
        .stat-fill.res { background: #708090; }
        .stat-fill.vel { background: #00E5FF; }
        .stat-fill.acc { background: #FFB300; }
        .stat-fill.dis { background: #7B1FA2; }
        .stat-fill.ins { background: #00C853; }

        /* Ability */
        .ability {
            margin: 8px 0;
            flex: 1;
        }

        .ability-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: #00E5FF;
            margin-bottom: 2px;
        }

        .ability-desc {
            font-size: 0.65rem;
            color: #ccc;
            line-height: 1.3;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        /* Flavor text */
        .flavor-text {
            font-size: 0.6rem;
            color: #888;
            font-style: italic;
            margin-top: auto;
            line-height: 1.2;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Rarity borders */
        .unit-card.common { border-color: #444; }
        .unit-card.uncommon { 
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .unit-card.rare { 
            border-color: #0099FF;
            box-shadow: 0 0 15px rgba(0, 153, 255, 0.4);
        }
        .unit-card.epic { 
            border-color: #9C27B0;
            box-shadow: 0 0 20px rgba(156, 39, 176, 0.5);
            animation: epicPulse 2s ease-in-out infinite alternate;
        }
        .unit-card.legendary { 
            border-color: #FFD700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            animation: legendaryGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes epicPulse {
            0% { box-shadow: 0 0 20px rgba(156, 39, 176, 0.5); }
            100% { box-shadow: 0 0 30px rgba(156, 39, 176, 0.8); }
        }

        @keyframes legendaryGlow {
            0% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); }
            100% { box-shadow: 0 0 40px rgba(255, 215, 0, 1); }
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 2rem;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 2px solid #00E5FF;
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: #00E5FF;
        }

        .modal-card {
            text-align: center;
            margin-bottom: 2rem;
        }

        .modal-unit-card {
            width: 240px;
            height: 387px;
            margin: 0 auto;
            transform: scale(1.3);
        }

        /* Radar chart */
        .radar-chart {
            margin: 2rem 0;
            text-align: center;
        }

        .radar-canvas {
            border: 1px solid #333;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        /* Equipment */
        .equipment-section {
            margin-top: 2rem;
        }

        .equipment-section h3 {
            color: #00E5FF;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .equipment-list {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 1rem;
        }

        .equipment-item {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background: rgba(0, 229, 255, 0.1);
            border-radius: 5px;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .unit-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .unit-card {
                width: 160px;
                height: 260px;
            }
        }

        @media (max-width: 900px) {
            .unit-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .unit-card {
                width: 140px;
                height: 220px;
            }
            .card-content {
                padding: 8px;
                height: 160px;
            }
        }

        @media (max-width: 600px) {
            .unit-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .unit-card {
                width: 100%;
                max-width: 300px;
                height: 200px;
                margin: 0 auto;
            }
            .controls {
                padding: 1rem;
            }
            .filter-buttons {
                justify-content: center;
            }
        }
    </style>
<link rel="stylesheet" href="design-system.css">
</head>
<body>
    <!-- Floating particles -->
    <div class="particles"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-logo"></div>
        <h1>CHAIN OF WAR — ARMORY</h1>
        <p>The Complete Unit Collection</p>
    </header>

    <!-- Controls -->
    <div class="controls">
        <div class="control-section">
            <h3>Filter by Faction</h3>
            <div class="filter-buttons" id="faction-filters">
                <button class="filter-btn" data-filter="all">All Factions</button>
                <button class="filter-btn faction-iron-covenant" data-filter="Iron Covenant">Iron Covenant</button>
                <button class="filter-btn faction-swarm-of-xeth" data-filter="Swarm of Xeth">Swarm of Xeth</button>
                <button class="filter-btn faction-void-pharaohs" data-filter="Void Pharaohs">Void Pharaohs</button>
                <button class="filter-btn faction-emerald-tide" data-filter="Emerald Tide">Emerald Tide</button>
                <button class="filter-btn faction-celestial-order" data-filter="Celestial Order">Celestial Order</button>
                <button class="filter-btn faction-warp-touched" data-filter="Warp Touched">Warp Touched</button>
                <button class="filter-btn faction-shadow-kin" data-filter="Shadow Kin">Shadow Kin</button>
                <button class="filter-btn faction-steel-legion" data-filter="Steel Legion">Steel Legion</button>
                <button class="filter-btn faction-bone-prophets" data-filter="Bone Prophets">Bone Prophets</button>
                <button class="filter-btn faction-apex-hunters" data-filter="Apex Hunters">Apex Hunters</button>
            </div>
        </div>

        <div class="control-section">
            <h3>Filter by Role</h3>
            <div class="filter-buttons" id="role-filters">
                <button class="filter-btn" data-filter="all">All Roles</button>
                <button class="filter-btn" data-filter="HQ">HQ</button>
                <button class="filter-btn" data-filter="Troops">Troops</button>
                <button class="filter-btn" data-filter="Elites">Elites</button>
                <button class="filter-btn" data-filter="Fast Attack">Fast Attack</button>
                <button class="filter-btn" data-filter="Heavy Support">Heavy Support</button>
            </div>
        </div>

        <div class="control-section">
            <h3>Filter by Rarity</h3>
            <div class="filter-buttons" id="rarity-filters">
                <button class="filter-btn" data-filter="all">All Rarities</button>
                <button class="filter-btn" data-filter="common">Common</button>
                <button class="filter-btn" data-filter="uncommon">Uncommon</button>
                <button class="filter-btn" data-filter="rare">Rare</button>
                <button class="filter-btn" data-filter="epic">Epic</button>
                <button class="filter-btn" data-filter="legendary">Legendary</button>
            </div>
        </div>

        <div class="control-section">
            <h3>Search & Sort</h3>
            <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;">
                <input type="text" id="search-input" class="search-box" placeholder="Search units...">
                <select id="sort-select" class="sort-select">
                    <option value="name">Sort by Name</option>
                    <option value="points">Sort by Points</option>
                    <option value="total">Sort by Total Stats</option>
                    <option value="war">Sort by WAR</option>
                    <option value="res">Sort by RES</option>
                    <option value="vel">Sort by VEL</option>
                    <option value="acc">Sort by ACC</option>
                    <option value="dis">Sort by DIS</option>
                    <option value="ins">Sort by INS</option>
                    <option value="rarity">Sort by Rarity</option>
                </select>
            </div>
        </div>

        <!-- Army Builder -->
        <div class="army-builder" id="army-builder">
            <div class="army-controls">
                <button class="toggle-builder-btn" id="toggle-builder">Enable Army Builder</button>
                <select id="point-limit" class="sort-select">
                    <option value="1000">1000 Points</option>
                    <option value="1500" selected>1500 Points</option>
                    <option value="2000">2000 Points</option>
                </select>
                <button class="filter-btn" id="export-army">Export Army JSON</button>
            </div>
            <div class="army-info" id="army-info">
                <div class="army-stat">Units: <strong id="army-count">0</strong></div>
                <div class="army-stat">Points: <strong id="army-points">0</strong>/<strong id="army-limit">1500</strong></div>
                <div class="army-stat">Faction: <strong id="army-faction">None</strong></div>
                <div class="army-stat">HQ: <strong id="army-hq">0</strong>/1</div>
                <div class="army-stat">Troops: <strong id="army-troops">0</strong>/∞ (min 2)</div>
            </div>
        </div>
    </div>

    <!-- Gallery -->
    <div class="gallery">

                abilities: ["Adaptive Armor", "Regenerative Growth"],

                equipment: ["Bio-Cannon (+2 WAR)", "Regeneration Matrix (+1 healing rate)"],
                flavor: "A living fortress that grows stronger with every battle scar.",
                rarity: "legendary"

        // Filter and sort state
        let filteredUnits = [...allUnits];
        let currentFilters = {
            faction: 'all',
            role: 'all',
            rarity: 'all',
            search: ''
        };
        let currentSort = 'name';

        // Army builder state
        let armyBuilderActive = false;
        let pointLimit = 1500;
        let currentArmy = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initParticles();
            renderGallery();
            setupEventListeners();
        });

        function initParticles() {
            const particlesContainer = document.querySelector('.particles');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = Math.random() * 4 + 2 + 'px';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function setupEventListeners() {
            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const filterType = this.parentElement.id.replace('-filters', '').replace('faction-', 'faction').replace('role-', 'role').replace('rarity-', 'rarity');
                    const filterValue = this.dataset.filter;
                    
                    // Update active state
                    this.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Update filter
                    currentFilters[filterType] = filterValue;
                    applyFilters();
                });
            });

            // Search
            document.getElementById('search-input').addEventListener('input', function() {
                currentFilters.search = this.value.toLowerCase();
                applyFilters();
            });

            // Sort
            document.getElementById('sort-select').addEventListener('change', function() {
                currentSort = this.value;
                sortAndRender();
            });

            // Army builder
            document.getElementById('toggle-builder').addEventListener('click', toggleArmyBuilder);
            document.getElementById('point-limit').addEventListener('change', function() {
                pointLimit = parseInt(this.value);
                document.getElementById('army-limit').textContent = pointLimit;
                updateArmyDisplay();
            });
            document.getElementById('export-army').addEventListener('click', exportArmy);

            // Modal
            document.getElementById('modal-close').addEventListener('click', closeModal);
            document.getElementById('unit-modal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
        }

        function applyFilters() {
            filteredUnits = allUnits.filter(unit => {
                // Faction filter
                if (currentFilters.faction !== 'all' && unit.faction !== currentFilters.faction) {
                    return false;
                }
                
                // Role filter
                if (currentFilters.role !== 'all' && unit.role !== currentFilters.role) {
                    return false;
                }
                
                // Rarity filter
                if (currentFilters.rarity !== 'all' && unit.rarity !== currentFilters.rarity) {
                    return false;
                }
                
                // Search filter
                if (currentFilters.search && !unit.name.toLowerCase().includes(currentFilters.search) && 
                    !unit.faction.toLowerCase().includes(currentFilters.search) &&
                    !unit.abilities.some(ability => ability.toLowerCase().includes(currentFilters.search))) {
                    return false;
                }
                
                return true;
            });
            
            sortAndRender();
        }

        function sortAndRender() {
            filteredUnits.sort((a, b) => {
                switch (currentSort) {
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'points':
                        return b.points - a.points;
                    case 'total':
                        return b.stats.total - a.stats.total;
                    case 'war':
                        return b.stats.war - a.stats.war;
                    case 'res':
                        return b.stats.res - a.stats.res;
                    case 'vel':
                        return b.stats.vel - a.stats.vel;
                    case 'acc':
                        return b.stats.acc - a.stats.acc;
                    case 'dis':
                        return b.stats.dis - a.stats.dis;
                    case 'ins':
                        return b.stats.ins - a.stats.ins;
                    case 'rarity':
                        const rarityOrder = { common: 1, uncommon: 2, rare: 3, epic: 4, legendary: 5 };
                        return (rarityOrder[b.rarity] || 0) - (rarityOrder[a.rarity] || 0);
                    default:
                        return 0;
                }
            });
            
            renderGallery();
        }

        function renderGallery() {
            const grid = document.getElementById('unit-grid');
            grid.innerHTML = '';
            
            filteredUnits.forEach((unit, index) => {
                const card = createUnitCard(unit, index);
                grid.appendChild(card);
            });
        }

        function createUnitCard(unit, index) {
            const card = document.createElement('div');
            card.className = `unit-card ${unit.rarity} ${unit.faction.toLowerCase().replace(/ /g, '-')}`;
            if (armyBuilderActive && currentArmy.some(armyUnit => armyUnit.name === unit.name)) {
                card.classList.add('in-army');
            }
            
            card.style.animationDelay = `${index * 0.05}s`;
            
            const factionClass = unit.faction.toLowerCase().replace(/ /g, '-');
            
            card.innerHTML = `
                <div class="card-header ${factionClass}">
                    <div class="faction-emblem"></div>
                    <div class="points-badge">${unit.points}</div>
                    <div class="role-badge">${unit.role}</div>
                </div>
                <div class="card-content">
                    <div class="unit-name">${unit.name}</div>
                    <div class="stats">
                        <div class="stat-bar">
                            <span class="stat-label">WAR</span>
                            <span class="stat-value">${unit.stats.war}</span>
                            <div class="stat-visual">
                                <div class="stat-fill war" style="width: ${unit.stats.war * 10}%"></div>
                            </div>
                        </div>
                        <div class="stat-bar">
                            <span class="stat-label">RES</span>
                            <span class="stat-value">${unit.stats.res}</span>
                            <div class="stat-visual">
                                <div class="stat-fill res" style="width: ${unit.stats.res * 10}%"></div>
                            </div>
                        </div>
                        <div class="stat-bar">
                            <span class="stat-label">VEL</span>
                            <span class="stat-value">${unit.stats.vel}</span>
                            <div class="stat-visual">
                                <div class="stat-fill vel" style="width: ${unit.stats.vel * 10}%"></div>
                            </div>
                        </div>
                        <div class="stat-bar">
                            <span class="stat-label">ACC</span>
                            <span class="stat-value">${unit.stats.acc}</span>
                            <div class="stat-visual">
                                <div class="stat-fill acc" style="width: ${unit.stats.acc * 10}%"></div>
                            </div>
                        </div>
                        <div class="stat-bar">
                            <span class="stat-label">DIS</span>
                            <span class="stat-value">${unit.stats.dis}</span>
                            <div class="stat-visual">
                                <div class="stat-fill dis" style="width: ${unit.stats.dis * 10}%"></div>
                            </div>
                        </div>
                        <div class="stat-bar">
                            <span class="stat-label">INS</span>
                            <span class="stat-value">${unit.stats.ins}</span>
                            <div class="stat-visual">
                                <div class="stat-fill ins" style="width: ${unit.stats.ins * 10}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="ability">
                        <div class="ability-name">${unit.abilities.join(', ')}</div>
                        <div class="ability-desc">${unit.abilityDesc}</div>
                    </div>
                    <div class="flavor-text">${unit.flavor}</div>
                </div>
            `;
            
            card.addEventListener('click', () => {
                if (armyBuilderActive) {
                    addToArmy(unit);
                } else {
                    openModal(unit);
                }
            });
            
            return card;
        }

        function openModal(unit) {
            const modal = document.getElementById('unit-modal');
            const modalCard = document.getElementById('modal-unit-card');
            const equipmentDiv = document.getElementById('modal-equipment');
            
            // Create larger card
            const card = createUnitCard(unit, 0);
            card.classList.add('modal-unit-card');
            modalCard.innerHTML = '';
            modalCard.appendChild(card);
            
            // Draw radar chart
            drawRadarChart(unit.stats);
            
            // Show equipment details
            equipmentDiv.innerHTML = `
                <div class="equipment-item">
                    <strong>Equipment Slots:</strong> ${unit.equipmentSlots}
                </div>
                ${unit.equipment.map(eq => `
                    <div class="equipment-item">${eq}</div>
                `).join('')}
                <div class="equipment-item" style="margin-top: 1rem; background: rgba(0, 229, 255, 0.2);">
                    <strong>Full Ability Description:</strong><br>${unit.abilityDesc}
                </div>
            `;
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('unit-modal').style.display = 'none';
        }

        function drawRadarChart(stats) {
            const canvas = document.getElementById('radar-canvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 100;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background grid
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let i = 1; i <= 5; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, (radius / 5) * i, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Draw axes
            const labels = ['WAR', 'RES', 'VEL', 'ACC', 'DIS', 'INS'];
            const colors = ['#B87333', '#708090', '#00E5FF', '#FFB300', '#7B1FA2', '#00C853'];
            const angles = [];
            
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                angles.push(angle);
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(
                    centerX + Math.cos(angle) * radius,
                    centerY + Math.sin(angle) * radius
                );
                ctx.stroke();
                
                // Draw labels
                ctx.fillStyle = colors[i];
                ctx.font = '12px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(
                    labels[i],
                    centerX + Math.cos(angle) * (radius + 20),
                    centerY + Math.sin(angle) * (radius + 20)
                );
            }
            
            // Draw stat polygon
            ctx.beginPath();
            ctx.strokeStyle = '#00E5FF';
            ctx.fillStyle = 'rgba(0, 229, 255, 0.2)';
            ctx.lineWidth = 2;
            
            const statValues = [stats.war, stats.res, stats.vel, stats.acc, stats.dis, stats.ins];
            
            for (let i = 0; i < 6; i++) {
                const value = statValues[i] / 10; // Normalize to 0-1
                const x = centerX + Math.cos(angles[i]) * radius * value;
                const y = centerY + Math.sin(angles[i]) * radius * value;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
                
                // Draw stat points
                ctx.fillStyle = colors[i];
                ctx.fillRect(x - 3, y - 3, 6, 6);
            }
            
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        function toggleArmyBuilder() {
            armyBuilderActive = !armyBuilderActive;
            const button = document.getElementById('toggle-builder');
            const builder = document.getElementById('army-builder');
            
            if (armyBuilderActive) {
                button.textContent = 'Disable Builder';
                button.style.background = 'linear-gradient(45deg, #FF5252, #B71C1C)';
                builder.classList.add('active');
            } else {
                button.textContent = 'Enable Builder';
                button.style.background = 'linear-gradient(45deg, #00E5FF, #0099CC)';
                builder.classList.remove('active');
            }
            
            renderGallery();
        }

        function addToArmy(unit) {
            if (!armyBuilderActive) return;
            
            const existingIndex = currentArmy.findIndex(armyUnit => armyUnit.name === unit.name);
            if (existingIndex !== -1) {
                currentArmy.splice(existingIndex, 1);
            } else {
                // Check point limit
                if (getCurrentArmyPoints() + unit.points > pointLimit) {
                    alert(`Adding this unit would exceed the ${pointLimit} point limit!`);
                    return;
                }
                
                // Check faction consistency
                if (currentArmy.length > 0) {
                    const armyFaction = currentArmy[0].faction;
                    if (unit.faction !== armyFaction) {
                        alert(`All units must be from the same faction! Current army is ${armyFaction}.`);
                        return;
                    }
                }
                
                currentArmy.push(unit);
            }
            
            updateArmyDisplay();
            renderGallery();
        }

        function getCurrentArmyPoints() {
            return currentArmy.reduce((total, unit) => total + unit.points, 0);
        }

        function updateArmyDisplay() {
            document.getElementById('army-count').textContent = currentArmy.length;
            document.getElementById('army-points').textContent = getCurrentArmyPoints();
            
            if (currentArmy.length > 0) {
                document.getElementById('army-faction').textContent = currentArmy[0].faction;
            } else {
                document.getElementById('army-faction').textContent = 'None';
            }
            
            const hqCount = currentArmy.filter(unit => unit.role === 'HQ').length;
            const troopsCount = currentArmy.filter(unit => unit.role === 'Troops').length;
            
            document.getElementById('army-hq').textContent = hqCount;
            document.getElementById('army-troops').textContent = troopsCount;
        }

        function exportArmy() {
            if (currentArmy.length === 0) {
                alert('No units in army to export!');
                return;
            }
            
            const armyData = {
                faction: currentArmy[0].faction,
                pointLimit: pointLimit,
                totalPoints: getCurrentArmyPoints(),
                units: currentArmy.map(unit => ({
                    name: unit.name,
                    role: unit.role,
                    points: unit.points,
                    stats: unit.stats
                }))
            };
            
            const blob = new Blob([JSON.stringify(armyData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chain-of-war-army-${armyData.faction.toLowerCase().replace(/\s+/g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Set initial active filters
        document.querySelector('[data-filter="all"]').classList.add('active');
        document.querySelectorAll('#role-filters [data-filter="all"], #rarity-filters [data-filter="all"]').forEach(btn => {
            btn.classList.add('active');
        });
    </script>
