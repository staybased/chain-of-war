<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chain of War — War Chest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap');

/* SHARED VISUAL STANDARDS */
/* BASE */
body { background: #050510 !important; }

/* TYPOGRAPHY */
h1, h2, h3, .title, .header { font-family: 'Orbitron', system-ui, sans-serif !important; letter-spacing: 3px; }

/* PANELS - glass morphism */
.panel, .card, section, .container, .sidebar, [class*="panel"], [class*="card"], [class*="section"] {
    background: rgba(255,255,255,0.03) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    backdrop-filter: blur(8px);
    border-radius: 12px !important;
}

/* STAT COLORS */
.stat-war, [data-stat="war"] { color: #B87333 !important; }
.stat-res, [data-stat="res"] { color: #708090 !important; }
.stat-vel, [data-stat="vel"] { color: #00E5FF !important; }
.stat-acc, [data-stat="acc"] { color: #FFB300 !important; }
.stat-dis, [data-stat="dis"] { color: #7B1FA2 !important; }
.stat-ins, [data-stat="ins"] { color: #00C853 !important; }

/* BUTTONS */
button, .btn, [class*="btn"], input[type="submit"] {
    background: linear-gradient(135deg, #00E5FF, #0088FF) !important;
    color: #000 !important;
    border: none !important;
    border-radius: 8px !important;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease !important;
}
button:hover, .btn:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4) !important; transform: translateY(-1px); }

/* INTERACTIVE */
* { transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, opacity 0.2s; }

/* WAR CHEST SPECIFIC ANIMATIONS */
@keyframes float { 
    0%,100% { transform: translateY(0); } 
    50% { transform: translateY(-6px); } 
}

@keyframes legendary-glow { 
    0%,100% { box-shadow: 0 0 20px #FFD700; } 
    50% { box-shadow: 0 0 40px #FFD700, 0 0 60px rgba(255,215,0,0.3); } 
}

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050510;
            color: #E0E0E0;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* === ANIMATED BACKGROUND === */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
        }
        .bg-gradient {
            background: radial-gradient(ellipse at 50% 40%, #0a0a2a 0%, #050510 70%);
            animation: bgPulse 20s ease infinite alternate;
        }
        @keyframes bgPulse {
            0% { background: radial-gradient(ellipse at 50% 40%, #0a0a2a 0%, #050510 70%); }
            100% { background: radial-gradient(ellipse at 50% 45%, #0a1025 0%, #050510 70%); }
        }

        .particle {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 1;
            background: radial-gradient(circle, rgba(255,200,50,0.8), transparent);
            animation: float 8s ease-in infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) scale(0.3); opacity: 0; }
        }

        /* === CONTENT LAYER === */
        .content { position: relative; z-index: 2; width: 100%; max-width: 1200px; padding: 20px; }

        /* === TABS === */
        .tabs {
            display: flex; gap: 2px; margin-bottom: 30px; justify-content: center;
        }
        .tab {
            padding: 10px 32px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            color: #666; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
            transition: all 0.3s;
        }
        .tab:first-child { border-radius: 6px 0 0 6px; }
        .tab:last-child { border-radius: 0 6px 6px 0; }
        .tab.active {
            background: rgba(0,229,255,0.1); border-color: rgba(0,229,255,0.3);
            color: #00E5FF; text-shadow: 0 0 10px rgba(0,229,255,0.3);
        }
        .tab:hover:not(.active) { background: rgba(255,255,255,0.05); color: #999; }

        /* === HEADER === */
        .header {
            text-align: center; margin: 30px 0 40px;
        }
        .header img {
            height: 60px; filter: brightness(1.2); mix-blend-mode: screen;
        }
        .header .subtitle {
            font-size: 18px; letter-spacing: 8px; color: #FFB300; margin-top: 8px;
            text-shadow: 0 0 20px rgba(255,179,0,0.3);
        }

        /* === CHEST SELECTION === */
        .chest-row {
            display: flex; justify-content: center; gap: 40px; margin: 40px 0;
            perspective: 1000px;
        }
        .chest {
            width: 220px; height: 300px; border-radius: 12px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 12px; position: relative; transition: all 0.4s ease;
            animation: float 3.5s ease-in-out infinite;
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,255,255,0.1);
        }
        .chest:nth-child(2) { animation-delay: -1.3s; }
        .chest:nth-child(3) { animation-delay: -2.6s; }
        @keyframes chestFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .chest:hover {
            transform: scale(1.05) translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .chest-image {
            width: 120px; height: 160px; object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255,200,50,0.3));
        }

        .chest.recruit { border-color: #B87333; box-shadow: 0 0 30px rgba(184,115,51,0.3); }
        .chest.recruit:hover { box-shadow: 0 0 50px rgba(184,115,51,0.6); }

        .chest.veteran { border-color: #C0C0C0; box-shadow: 0 0 30px rgba(192,192,192,0.3); }
        .chest.veteran:hover { box-shadow: 0 0 50px rgba(192,192,192,0.6); }

        .chest.commander { border-color: #FFD700; box-shadow: 0 0 30px rgba(255,215,0,0.3); }
        .chest.commander:hover { box-shadow: 0 0 50px rgba(255,215,0,0.6); }

        .chest-label {
            font-size: 18px; font-weight: bold; text-align: center;
            text-transform: uppercase; letter-spacing: 2px;
        }
        
        .chest-details {
            font-size: 12px; color: #999; text-align: center; line-height: 1.4;
        }
        
        .chest-price {
            font-size: 14px; color: #FFB300; font-weight: bold;
            text-shadow: 0 0 10px rgba(255,179,0,0.5);
        }

        /* === OPENING OVERLAY === */
        .opening-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: none; justify-content: center; align-items: center;
            flex-direction: column;
        }

        .opening-chest {
            width: 200px; height: 200px; margin-bottom: 50px;
            animation: chestShake 2s ease-in-out;
        }

        @keyframes chestShake {
            0%, 100% { transform: scale(1) rotate(0deg); }
            10% { transform: scale(1.02) rotate(1deg); }
            20% { transform: scale(0.98) rotate(-1deg); }
            30% { transform: scale(1.03) rotate(2deg); }
            40% { transform: scale(0.97) rotate(-2deg); }
            50% { transform: scale(1.05) rotate(3deg); }
            60% { transform: scale(0.95) rotate(-3deg); }
            70% { transform: scale(1.08) rotate(2deg); }
            80% { transform: scale(0.92) rotate(-1deg); }
            90% { transform: scale(1.1) rotate(1deg); }
        }

        .card-fan {
            display: flex; justify-content: center; align-items: flex-end;
            gap: -20px; margin-top: 30px; perspective: 1000px;
        }

        .card {
            width: 170px; height: 260px; position: relative; cursor: pointer;
            transition: all 0.6s ease; transform-style: preserve-3d;
            margin: 0 -15px;
        }

        .card:nth-child(1) { transform: rotate(-15deg); }
        .card:nth-child(2) { transform: rotate(-7deg); }
        .card:nth-child(3) { transform: rotate(0deg); }
        .card:nth-child(4) { transform: rotate(7deg); }
        .card:nth-child(5) { transform: rotate(15deg); }

        .card:hover { transform: translateY(-20px) scale(1.05); z-index: 10; }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column;
        }

        .card-back {
            background: url('assets/card-back.png') center/cover;
            background-color: #1a1a2a;
        }

        .card-front {
            background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
            transform: rotateY(180deg); padding: 12px;
            color: white; font-size: 12px;
        }

        .card-header {
            height: 40px; border-radius: 8px 8px 0 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; margin-bottom: 8px;
        }

        .faction-emblem {
            width: 32px; height: 32px;
        }

        .role-badge {
            padding: 2px 8px; border-radius: 10px; font-size: 8px;
            text-transform: uppercase; font-weight: bold;
        }

        .unit-name {
            text-align: center; font-size: 14px; font-weight: bold;
            margin-bottom: 8px;
        }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 3px; margin-bottom: 8px;
        }

        .stat-bar {
            display: flex; align-items: center; gap: 4px;
            font-size: 10px;
        }

        .stat-name { width: 25px; font-weight: bold; }
        .stat-value { 
            flex: 1; height: 8px; border-radius: 4px;
            position: relative; background: rgba(0,0,0,0.3);
        }
        .stat-fill {
            height: 100%; border-radius: 4px;
            position: absolute; top: 0; left: 0;
        }

        .ability-name {
            font-weight: bold; font-size: 11px; margin-bottom: 2px;
        }

        .flavor-text {
            font-style: italic; font-size: 9px; color: #999;
            margin-top: auto; text-align: center;
        }

        /* === RARITY EFFECTS === */
        .card.uncommon .card-front { border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .card.rare .card-front { border-color: #0088ff; box-shadow: 0 0 15px rgba(0,136,255,0.5); }
        .card.epic .card-front { 
            border-color: #8800ff; 
            box-shadow: 0 0 20px rgba(136,0,255,0.7);
            animation: epicPulse 2s ease infinite;
        }
        .card.legendary .card-front { 
            border-color: #ffaa00; 
            box-shadow: 0 0 25px rgba(255,170,0,0.8);
            animation: legendary-glow 1.5s ease infinite alternate;
        }

        @keyframes epicPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(136,0,255,0.7); }
            50% { box-shadow: 0 0 30px rgba(136,0,255,1); }
        }

        @keyframes legendaryGlow {
            0% { 
                box-shadow: 0 0 25px rgba(255,170,0,0.8);
                transform: rotateY(180deg) scale(1);
            }
            100% { 
                box-shadow: 0 0 40px rgba(255,170,0,1), 0 0 60px rgba(255,215,0,0.5);
                transform: rotateY(180deg) scale(1.02);
            }
        }

        /* === FACTION COLORS === */
        .iron-covenant { background: linear-gradient(135deg, #4a5568, #2d3748); }
        .swarm-xeth { background: linear-gradient(135deg, #2d5016, #1a2e05); }
        .void-pharaohs { background: linear-gradient(135deg, #2d1b69, #1a103f); }
        .emerald-tide { background: linear-gradient(135deg, #22543d, #1a2e25); }
        .celestial-order { background: linear-gradient(135deg, #1e3a8a, #1e2763); }
        .warp-touched { background: linear-gradient(135deg, #7c2d12, #5b1a00); }
        .shadow-kin { background: linear-gradient(135deg, #374151, #1f2937); }
        .steel-legion { background: linear-gradient(135deg, #3c4043, #2c2c2c); }
        .bone-prophets { background: linear-gradient(135deg, #45403d, #2c2722); }
        .apex-hunters { background: linear-gradient(135deg, #543d2a, #3c2a1e); }

        /* === SUMMARY === */
        .pack-summary {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); border: 2px solid rgba(0,229,255,0.3);
            border-radius: 12px; padding: 20px; text-align: center;
            display: none; z-index: 101;
        }

        .summary-buttons {
            display: flex; gap: 10px; margin-top: 15px; justify-content: center;
        }

        .btn {
            padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s; font-size: 12px;
        }

        .btn-primary {
            background: rgba(0,229,255,0.2); color: #00E5FF;
            border: 1px solid rgba(0,229,255,0.5);
        }

        .btn-primary:hover {
            background: rgba(0,229,255,0.3); transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05); color: #999;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1); color: #ccc;
        }

        /* === COLLECTION === */
        .collection-view {
            display: none; max-height: 600px; overflow-y: auto;
        }

        .collection-item {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03); border-radius: 8px;
            padding: 12px; margin-bottom: 8px;
        }

        .collection-emblem {
            width: 40px; height: 40px;
        }

        .collection-details h4 {
            color: #00E5FF; margin-bottom: 4px;
        }

        .collection-stats {
            font-size: 12px; color: #999;
        }

        /* === HIDDEN === */
        .hidden { display: none !important; }
    </style>

<body>
    <!-- Animated Background -->
    <div class="bg-layer bg-gradient"></div>

    <!-- Content -->
    <div class="content">
        <!-- Navigation Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="packs">Open Packs</div>
            <div class="tab" data-tab="collection">My Collection</div>
        </div>

        <!-- Header -->
        <div class="header">
            <img src="assets/logo.png" alt="Chain of War">
            <div class="subtitle">WAR CHEST</div>
        </div>

        <!-- Pack Opening View -->
        <div id="pack-view">
            <div class="chest-row">
                <div class="chest recruit" data-tier="recruit">
                    <img src="assets/chest-recruit.png" alt="Recruit Chest" class="chest-image">
                    <div class="chest-label">Recruit</div>
                    <div class="chest-details">4-5 Units<br>Common Focus</div>
                    <div class="chest-price">0.02 ETH</div>
                </div>
                <div class="chest veteran" data-tier="veteran">
                    <img src="assets/chest-veteran.png" alt="Veteran Chest" class="chest-image">
                    <div class="chest-label">Veteran</div>
                    <div class="chest-details">5-7 Units<br>Rare Chance</div>
                    <div class="chest-price">0.05 ETH</div>
                </div>
                <div class="chest commander" data-tier="commander">
                    <img src="assets/chest-commander.png" alt="Commander Chest" class="chest-image">
                    <div class="chest-label">Commander</div>
                    <div class="chest-details">7-9 Units<br>Epic Guaranteed</div>
                    <div class="chest-price">0.10 ETH</div>
                </div>
            </div>
        </div>

        <!-- Collection View -->
        <div id="collection-view" class="collection-view">
            <div id="collection-list"></div>
        </div>
    </div>

    <!-- Opening Overlay -->
    <div class="opening-overlay" id="opening-overlay">
        <img id="opening-chest-img" class="opening-chest" src="" alt="Opening Chest">
        <div class="card-fan" id="card-fan"></div>
    </div>

    <!-- Pack Summary -->
    <div class="pack-summary" id="pack-summary">
        <div id="summary-content"></div>
        <div class="summary-buttons">
            <button class="btn btn-primary" id="open-another">Open Another</button>
            <button class="btn btn-secondary" id="view-collection">View Collection</button>
        </div>
    </div>

        const rarityOdds = {
            'Troops': [55, 25, 15, 4, 1],
            'Elites': [40, 25, 20, 12, 3],
            'Fast Attack': [45, 20, 20, 12, 3],
            'Heavy Support': [35, 20, 20, 20, 5],
            'HQ': [30, 25, 25, 15, 5]
        };

        const rarityNames = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
        const statColors = {
            WAR: '#B87333',
            RES: '#708090',
            VEL: '#00E5FF',
            ACC: '#FFB300',
            DIS: '#7B1FA2',
            INS: '#00C853'
        };

        // Game State
        let gameState = {
            collection: JSON.parse(localStorage.getItem('cowCollection') || '[]'),
            currentPack: null
        };

        // Audio Context
        let audioContext;
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(frequency, duration, type = 'sine', volume = 0.1) {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + duration);
        }

        function playCardFlipSound(rarity) {
            switch(rarity) {
                case 'common':
                    playSound(800, 0.08);
                    break;
                case 'uncommon':
                    playSound(1000, 0.1);
                    playSound(1200, 0.08);
                    break;
                case 'rare':
                    playSound(600, 0.15);
                    playSound(800, 0.12);
                    playSound(1000, 0.1);
                    break;
                case 'epic':
                    playSound(400, 0.2);
                    playSound(600, 0.18);
                    playSound(800, 0.15);
                    playSound(1000, 0.12);
                    break;
                case 'legendary':
                    playSound(200, 0.3);
                    playSound(400, 0.25);
                    playSound(600, 0.2);
                    playSound(800, 0.15);
                    break;
            }
        }

        // Utility Functions
        function getRarity(role) {
            const odds = rarityOdds[role];
            const roll = Math.random() * 100;
            let cumulative = 0;
            
            for (let i = 0; i < odds.length; i++) {
                cumulative += odds[i];
                if (roll <= cumulative) {
                    return rarityNames[i];
                }
            }
            return 'common';
        }

        function getRandomUnit(faction) {
            const units = Object.keys(factions[faction].units);
            return units[Math.floor(Math.random() * units.length)];
        }

        function generatePack(tier) {
            let cardCount;
            switch(tier) {
                case 'recruit': cardCount = Math.floor(Math.random() * 2) + 4; break;
                case 'veteran': cardCount = Math.floor(Math.random() * 3) + 5; break;
                case 'commander': cardCount = Math.floor(Math.random() * 3) + 7; break;
            }

            const pack = [];
            const factionKeys = Object.keys(factions);
            
            for (let i = 0; i < cardCount; i++) {
                const factionKey = factionKeys[Math.floor(Math.random() * factionKeys.length)];
                const faction = factions[factionKey];
                const unitName = getRandomUnit(factionKey);
                const unit = faction.units[unitName];
                const rarity = getRarity(unit.role);
                
                pack.push({
                    factionKey,
                    faction: faction.name,
                    unitName,
                    unit,
                    rarity
                });
            }
            
            return pack;
        }

        function createCard(cardData, index) {
            const card = document.createElement('div');
            card.className = `card ${cardData.rarity}`;
            card.dataset.index = index;
            
            const rotation = [-15, -7, 0, 7, 15][index % 5];
            card.style.transform = `rotate(${rotation}deg)`;
            
            card.innerHTML = `
                <div class="card-face card-back"></div>
                <div class="card-face card-front ${cardData.factionKey}">
                    <div class="card-header">
                        <img src="assets/emblem-${cardData.factionKey}.png" alt="${cardData.faction}" class="faction-emblem">
                        <div class="role-badge">${cardData.unit.role}</div>
                    </div>
                    <div class="unit-name">${cardData.unitName}</div>
                    <div class="stats-grid">
                        ${Object.entries(cardData.unit.stats).map(([stat, value]) => `
                            <div class="stat-bar">
                                <div class="stat-name">${stat}</div>
                                <div class="stat-value">
                                    <div class="stat-fill" style="width: ${(value/10)*100}%; background: ${statColors[stat]}"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="ability-name">${cardData.unit.ability}</div>
                    <div class="flavor-text">"${cardData.unit.flavor}"</div>
                </div>
            `;
            
            card.addEventListener('click', () => flipCard(card, cardData));
            return card;
        }

        function flipCard(card, cardData) {
            if (card.classList.contains('flipped')) return;
            
            card.classList.add('flipped');
            
            setTimeout(() => {
                playCardFlipSound(cardData.rarity);
                
                if (cardData.rarity === 'legendary') {
                    // Legendary effect: dim other cards and elevate this one
                    document.querySelectorAll('.card:not(.flipped)').forEach(otherCard => {
                        otherCard.style.opacity = '0.3';
                    });
                    card.style.transform += ' translateY(-30px) scale(1.1)';
                    card.style.zIndex = '20';
                    
                    setTimeout(() => {
                        document.querySelectorAll('.card').forEach(otherCard => {
                            otherCard.style.opacity = '1';
                        });
                        checkPackComplete();
                    }, 2500);
                } else if (cardData.rarity === 'epic') {
                    // Screen shake effect
                    document.body.style.animation = 'shake 0.5s ease';
                    setTimeout(() => {
                        document.body.style.animation = '';
                        checkPackComplete();
                    }, 500);
                } else {
                    setTimeout(checkPackComplete, 300);
                }
            }, 300);
        }

        function checkPackComplete() {
            const allCards = document.querySelectorAll('.card');
            const flippedCards = document.querySelectorAll('.card.flipped');
            
            if (allCards.length === flippedCards.length) {
                setTimeout(showPackSummary, 1000);
            }
        }

        function showPackSummary() {
            const pack = gameState.currentPack;
            let totalPoints = 0;
            const roleCounts = {};
            const factionCounts = {};
            
            pack.forEach(card => {
                totalPoints += card.unit.points;
                roleCounts[card.unit.role] = (roleCounts[card.unit.role] || 0) + 1;
                factionCounts[card.faction] = (factionCounts[card.faction] || 0) + 1;
            });
            
            const dominantFaction = Object.entries(factionCounts).reduce((a, b) => 
                factionCounts[a[0]] > factionCounts[b[0]] ? a : b
            )[0];
            
            const starRating = Math.min(5, Math.floor(totalPoints / 200));
            
            document.getElementById('summary-content').innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                    <img src="assets/emblem-${Object.keys(factions).find(k => factions[k].name === dominantFaction)}.png" 
                         alt="${dominantFaction}" style="width: 48px; height: 48px;">
                    <div>
                        <h3 style="color: #FFB300; margin-bottom: 5px;">${totalPoints} Total Points</h3>
                        <div style="color: #999;">
                            ${Object.entries(roleCounts).map(([role, count]) => `${count} ${role}`).join(' • ')}
                        </div>
                        <div style="color: #FFB300; margin-top: 5px;">
                            ${'★'.repeat(starRating)}${'☆'.repeat(5-starRating)}
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('pack-summary').style.display = 'block';
            
            // Save to collection
            gameState.collection.push({
                timestamp: Date.now(),
                dominantFaction,
                totalPoints,
                roleCounts,
                starRating,
                cards: pack.length
            });
            
            localStorage.setItem('cowCollection', JSON.stringify(gameState.collection));
        }

        function openPack(tier) {
            initAudio();
            const pack = generatePack(tier);
            gameState.currentPack = pack;
            
            // Show opening overlay
            const overlay = document.getElementById('opening-overlay');
            const chestImg = document.getElementById('opening-chest-img');
            const cardFan = document.getElementById('card-fan');
            
            chestImg.src = `assets/chest-${tier}.png`;
            overlay.style.display = 'flex';
            
            // Clear previous cards
            cardFan.innerHTML = '';
            
            // Chest shake and explosion
            setTimeout(() => {
                // Play rumble sound
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => playSound(60 + Math.random() * 40, 0.1, 'sawtooth', 0.05), i * 100);
                }
                
                // Burst effect after shaking
                setTimeout(() => {
                    chestImg.style.display = 'none';
                    
                    // Create cards
                    pack.forEach((cardData, index) => {
                        const card = createCard(cardData, index);
                        cardFan.appendChild(card);
                    });
                    
                    // Play burst sound
                    playSound(1200, 0.3, 'sine', 0.2);
                    playSound(800, 0.4, 'sine', 0.15);
                    
                }, 2000);
            }, 100);
        }

        function showCollection() {
            const collectionList = document.getElementById('collection-list');
            collectionList.innerHTML = '';
            
            if (gameState.collection.length === 0) {
                collectionList.innerHTML = '<p style="text-align: center; color: #666; padding: 40px;">No packs opened yet. Start by opening your first pack!</p>';
                return;
            }
            
            gameState.collection.reverse().forEach(pack => {
                const date = new Date(pack.timestamp).toLocaleDateString();
                const factionKey = Object.keys(factions).find(k => factions[k].name === pack.dominantFaction);
                
                const item = document.createElement('div');
                item.className = 'collection-item';
                item.innerHTML = `
                    <img src="assets/emblem-${factionKey}.png" alt="${pack.dominantFaction}" class="collection-emblem">
                    <div class="collection-details">
                        <h4>${pack.dominantFaction} Army</h4>
                        <div class="collection-stats">
                            ${pack.totalPoints} points • ${pack.cards} units • ${'★'.repeat(pack.starRating)}${'☆'.repeat(5-pack.starRating)} • ${date}
                        </div>
                    </div>
                `;
                collectionList.appendChild(item);
            });
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Tab switching
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    const tabName = tab.dataset.tab;
                    if (tabName === 'packs') {
                        document.getElementById('pack-view').style.display = 'block';
                        document.getElementById('collection-view').style.display = 'none';
                    } else {
                        document.getElementById('pack-view').style.display = 'none';
                        document.getElementById('collection-view').style.display = 'block';
                        showCollection();
                    }
                });
            });
            
            // Chest clicking
            document.querySelectorAll('.chest').forEach(chest => {
                chest.addEventListener('click', () => {
                    const tier = chest.dataset.tier;
                    openPack(tier);
                });
            });
            
            // Summary buttons
            document.getElementById('open-another').addEventListener('click', () => {
                document.getElementById('pack-summary').style.display = 'none';
                document.getElementById('opening-overlay').style.display = 'none';
                document.getElementById('opening-chest-img').style.display = 'block';
            });
            
            document.getElementById('view-collection').addEventListener('click', () => {
                document.getElementById('pack-summary').style.display = 'none';
                document.getElementById('opening-overlay').style.display = 'none';
                document.getElementById('opening-chest-img').style.display = 'block';
                
                // Switch to collection tab
                document.querySelector('.tab[data-tab="collection"]').click();
            });
            
            // Create floating particles
            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.width = particle.style.height = (Math.random() * 3 + 1) + 'px';
                particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
                particle.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 10000);
            }
            
            // Create particles periodically
            setInterval(createParticle, 2000);
            
            // Create initial particles
            for (let i = 0; i < 10; i++) {
                setTimeout(createParticle, i * 200);
            }
        });
        
        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10% { transform: translateX(-2px); }
                20% { transform: translateX(2px); }
                30% { transform: translateX(-2px); }
                40% { transform: translateX(2px); }
                50% { transform: translateX(-1px); }
                60% { transform: translateX(1px); }
                70% { transform: translateX(-1px); }
                80% { transform: translateX(1px); }
                90% { transform: translateX(-1px); }
            }
        `;
        document.head.appendChild(style);
    </script>

    <script src="nav.js"></script>
</body>
</html>
